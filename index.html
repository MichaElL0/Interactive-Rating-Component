<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Interactive rating component</title>
</head>
<body>

  <!-- Rating state start -->

  <div class="wrapper">

    <div class="start-state">
      <div class="icon">
        <img src="./images/icon-star.svg" alt="">
      </div>
      <div class="text-wrap">
        <h1>How did we do?</h1>
        <p>
          Please let us know how we did with your support request. All feedback is appreciated
          to help us improve our offering!
        </p>
      </div>
      <div class="rating">
        <fieldset>
          <input type="radio" name="rating" id="r1" value="1">
          <label for="r1">1</label>
          <input type="radio" name="rating" id="r2" value="2">
          <label for="r2">2</label>
          <input type="radio" name="rating" id="r3" value="3">
          <label for="r3">3</label>
          <input type="radio" name="rating" id="r4" value="4">
          <label for="r4">4</label>
          <input type="radio" name="rating" id="r5" value="5">
          <label for="r5">5</label>
        </fieldset>
      </div>
      <button type="submit">SUBMIT</button>
      <!-- Rating state end -->
    </div>

    <div class="end-state hide">
      <div class="icon-end"><img src="./images/illustration-thank-you.svg" alt=""></div>
      <p id="rating-select">You selected <span id="rating-selected-value">1</span> out of 5</p>
      <div class="end-state-text-wrapper">
        <h1>Thank you!</h1>
        <p>
          We appreciate you taking the time to give a rating. If you ever need more support,
          don’t hesitate to get in touch!
        </p>
      </div>
    </div>

  </div>

  <!-- Thank you state end -->

  
  <script src="script.js"></script>

</body>
</html>
